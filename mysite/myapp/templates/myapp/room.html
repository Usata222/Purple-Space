This is a {{chatroom.name}} chatroom
{{request.user.username|json_script:"json-username"}}
{{chatroom.slug|json_script:"json-chatroomname"}}

<div id="chat-messages">
  {% for message in messages %}
  {{message.user.username}}:{{message.message_content}} </br> 
  {% endfor %}
</div>
<form action="" method="POST">
  <input
    type="text"
    name="message"
    placeholder="Enter message"
    id="message-input"
  />
  <button id="send-button" type="submit">Send</button>
</form>
<script>
  const username = JSON.parse(
    document.getElementById("json-username").textContent
  );
  const chatRoomName = JSON.parse(
    document.getElementById("json-chatroomname").textContent
  );
  const chatSocket = new WebSocket(
    "ws://" + window.location.host + "/ws/" + chatRoomName + "/"
  );
  chatSocket.onmessage = function (e) {
    console.log("This is a message");
    const data = JSON.parse(e.data);
    if (data.message) {
      console.log("Recieved message to the client is: ", data.message);
      let html = data.username + ":" + data.message + "</br>";
      document.getElementById("chat-messages").innerHTML += html;
    } else {
      alert("The message was empty");
    }
  };
  chatSocket.onclose = function (e) {
    console.log("Socket closed");
  };

  document.getElementById("send-button").onclick = function (e) {
    e.preventDefault();
    const messageInput = document.getElementById("message-input");

    const message = messageInput.value;

    chatSocket.send(
      JSON.stringify({
        message: message,
        username: username,
        room: chatRoomName,
      })
    );

    messageInput.value = "";
  };
</script>
